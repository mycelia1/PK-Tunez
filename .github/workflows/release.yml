name: Release

# Builds PK-Tunez installers for Windows and macOS. Each build job publishes its
# own installer to the GitHub Release independently, so a slow or unavailable
# runner for one platform never blocks the others from publishing.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Bundle sidecar binaries (scdl + ffmpeg)
        run: npm run bundle:binaries:win

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PK-Tunez-Windows
          path: release/**/*-Setup.exe
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*-Setup.exe
          fail_on_unmatched_files: true

  build-mac:
    name: Build macOS dmg (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          # macos-13 (Intel) was retired 2025-12-04; macos-15-intel is the last
          # GitHub-hosted x86_64 macOS runner (available until ~Aug 2027).
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Bundle sidecar binaries (scdl + ffmpeg)
        run: npm run bundle:binaries:mac

      - name: Build macOS dmg
        run: npm run build && npx electron-builder --mac --${{ matrix.arch }} --publish never --config electron-builder.yml

      # Scope to the matrix arch so the arm64 runner never uploads/publishes the
      # x64 dmg it may incidentally produce (its bundled sidecars are arm64).
      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: PK-Tunez-Mac-${{ matrix.arch }}
          path: release/**/*-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*-${{ matrix.arch }}.dmg
          fail_on_unmatched_files: true
